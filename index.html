<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Slides verticais de imunização com visual didático e animações." />
    <title>Aula de Imunização</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="css/slides.css" rel="stylesheet" />
</head>
<body>
    <div class="class-topbar">
        <div class="class-ident">
            <span class="class-prof">Prof. Enf. Walter Rocha</span>
            <span class="class-group">Turma 1 Módulo Tec. Enfermagem - Colégio e Faculdade Marqês de Olinda</span>
        </div>
        <div id="classClock" class="class-clock" aria-live="polite">
            <span id="clockText">00:00:00</span>
        </div>
    </div>
    <main id="deck" class="deck" aria-live="polite"></main>

    <aside class="rail" aria-hidden="true">
        <div id="dotRail" class="dot-rail"></div>
    </aside>

    <div class="deck-controls" role="navigation" aria-label="Navegação dos slides">
        <button id="prevBtn" class="ctrl-btn icon-only" type="button" aria-label="Slide anterior">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="ctrl-center">
            <div id="counter" class="counter">1 / 1</div>
            <div id="progress" class="progress"></div>
        </div>
        <button id="nextBtn" class="ctrl-btn icon-only" type="button" aria-label="Próximo slide">
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <script src="js/slides.js"></script>
</body>
</html>
